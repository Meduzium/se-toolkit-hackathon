version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: music_bot_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: music_bot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d music_bot_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - music_bot_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: music_bot_backend
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/music_bot_db
      GENIUS_API_KEY: ${GENIUS_API_KEY:-}
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./downloads:/app/downloads
    networks:
      - music_bot_network
    restart: unless-stopped

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: music_bot_telegram
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./bot:/app
    networks:
      - music_bot_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  music_bot_network:
    driver: bridge
